<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44" width="180" height="44">
  <!-- Logo Icon Badge: High-contrast gold with interactive scale design -->
  <rect x="2" y="2" width="40" height="40" rx="10" fill="#E8C670" />
  
  <!-- Centered Serif letter "D" -->
  <text x="22" y="29" font-family="Georgia, 'Times New Roman', Times, serif" font-weight="900" font-size="24" fill="#120822" text-anchor="middle">D</text>

  <!-- Brand Typography -->
  <!-- "DFL" - elegant, high-contrast white text -->
  <text x="52" y="22" font-family="Georgia, 'Times New Roman', Times, serif" font-weight="900" font-size="20" fill="#FFFFFF" letter-spacing="0.5">DFL</text>
  
  <!-- "CONSIGNADO" - sub-branding in high-visibility gold-accent tracker -->
  <text x="52" y="36" font-family="'Inter', Arial, Helvetica, sans-serif" font-weight="800" font-size="10" fill="#E8C670" letter-spacing="2">CONSIGNADO</text>
</svg>
